apiVersion: apps/v1
kind: Deployment
metadata:
  name: clap-fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clap-fastapi
  template:
    metadata:
      labels:
        app: clap-fastapi
    spec:
      containers:
      - name: clap-fastapi
        image: clap-fastapi:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 500m
            memory: 3000Mi
          limits:
            cpu: 4000m
            memory: 8000Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          failureThreshold: 3
