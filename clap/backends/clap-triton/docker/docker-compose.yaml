services:
  triton:
    build:
      context: ..
      dockerfile: docker/Dockerfile.triton
    image: clap-triton-server:latest
    ports:
      - "8000:8000"   # Triton HTTP
      - "8001:8001"   # Triton gRPC
      - "8002:8002"   # Triton metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    shm_size: "256m"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: clap-triton-api:latest
    ports:
      - "8080:8000"   # FastAPI gateway (host:8080 → container:8000)
    environment:
      - TRITON_URL=triton:8001
    depends_on:
      triton:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
