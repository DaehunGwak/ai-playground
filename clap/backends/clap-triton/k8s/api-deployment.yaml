apiVersion: apps/v1
kind: Deployment
metadata:
  name: clap-triton-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clap-triton-api
  template:
    metadata:
      labels:
        app: clap-triton-api
    spec:
      containers:
      - name: api
        image: clap-triton-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: TRITON_URL
          value: "clap-triton-server:8001"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
