apiVersion: apps/v1
kind: Deployment
metadata:
  name: clap-2t-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clap-2t-gateway
  template:
    metadata:
      labels:
        app: clap-2t-gateway
    spec:
      containers:
        - name: gateway
          image: clap-2t-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_SERVICE_URL
              value: http://clap-2t-model:80
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
